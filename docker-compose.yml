services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ecommerce-recommendations-db
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce_secret
      POSTGRES_DB: ecommerce_recommendations
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce_recommendations"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
